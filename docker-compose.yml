# === CONFIGURACIÓN DOCKER COMPOSE PARA PRODUCCIÓN (AWS) ===
# Instrucciones para TI:
# 1. Asegúrense de copiar el archivo '.env.example' y renombrarlo a '.env'
# 2. Llenen los valores en el nuevo '.env' (Usuario, Contraseña, y Master Key vacía para que se auto-genere).
# 3. Levantar con: docker compose up -d

services:
  centro-comando:
    # Nombre de la imagen y del contenedor
    image: centro-comando-telematica:latest
    container_name: centro-comando-app
    
    # Le indicamos a Docker que construya la imagen desde el Dockerfile en este mismo directorio
    build:
      context: .
      dockerfile: Dockerfile
    
    # Política de reinicio: Si el servidor AWS se reinicia, este contenedor arrancará solo automáticamente.
    restart: unless-stopped
    
    # Cargamos el archivo de configuración secreto (.env)
    # Importante: Este archivo NUNCA debe subirse a Git.
    env_file:
      - .env
    
    # Variables de entorno adicionales específicas para el despliegue
    environment:
      - APP_ENV=production
      
    # Mapeo de Puertos: "puerto_externo:puerto_interno"
    # El firewall del servidor y el Reverse Proxy (HTTPS/443) deberán redirigir el tráfico hacia este puerto 8000 local.
    ports:
      - "8000:8000"
      
    # Mapeo de Volúmenes (Persistencia de Datos)
    # Como usamos SQLite, es CRÍTICO que estas carpetas residan en el disco duro físico del servidor AWS.
    # Sintaxis: "./carpeta_local_aws:/carpeta_dentro_del_docker"
    volumes:
      - ./db:/app/db           # Bases de datos fragmentadas (Sharding)
      - ./logs:/app/logs       # Logs de la aplicación y sistema
      - ./audit:/app/audit     # Logs crudos de auditoría JSONL (Forenses)
      
    # Limita el tamaño de los logs generados por el mismísimo Docker para que no llene el disco de AWS.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
